name: build kernel with Nix
on:
  workflow_dispatch:
    inputs:
      kernel_attribute:
        type: string
        required: true
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: cachix/install-nix-action@v31
    - uses: cachix/cachix-action@v15
      with:
        name: tkt-cache
        authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}" #
    - run: nix build --no-write-lock-file --print-out-paths  --print-build-logs ${{ github.workspace }}#${{inputs.kernel_attribute}}

